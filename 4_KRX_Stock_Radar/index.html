<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1004MAS KRX Sniper Radar v10.12 'PALJINDO 8'</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-gold: #ffcc00;
            --neon-red: #ff003c;
            --glass-bg: rgba(10, 15, 25, 0.85);
            --captain-bg: rgba(40, 25, 10, 0.9);
        }
        body {
            background-color: #05080a;
            color: #e0e0e0;
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 243, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 204, 0, 0.05) 0%, transparent 50%);
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            border-radius: 12px;
            padding: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            border-color: var(--neon-blue);
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 12px 48px 0 rgba(0, 243, 255, 0.2);
        }
        .captain-card {
            background: var(--captain-bg);
            border: 1px solid rgba(255, 204, 0, 0.3);
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.1);
        }
        .captain-card:hover {
            border-color: var(--neon-gold);
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.3);
        }
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 243, 255, 0.1);
            animation: scanline 8s linear infinite;
            z-index: 9999; pointer-events: none;
        }
    </style>
</head>
<body class="p-2 md:p-6">
    <div class="scanline"></div>

    <!-- Header Section -->
    <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div class="flex items-center gap-4">
            <div class="w-16 h-16 bg-red-600 rounded-full flex items-center justify-center border-4 border-white shadow-[0_0_20px_rgba(255,0,0,0.5)]">
                <i class="fas fa-crosshairs text-4xl text-white"></i>
            </div>
            <div>
                <h1 class="orbitron text-3xl font-black tracking-tighter text-white flex items-center gap-2 flex-wrap">
                    1004MAS KRX RADAR <span class="text-neon-gold text-xl px-2 py-0.5 bg-gray-900 border border-gold-500 rounded whitespace-nowrap">PALJINDO 8 v10.12 'IRON DOME'</span>
                </h1>
            </div>
        </div>
        <div class="flex flex-col items-end gap-2">
            <div id="market-indices" class="flex flex-wrap justify-end gap-3">
                <!-- Market info injected here -->
            </div>
        </div>
    </header>

    <!-- Main Command Center -->
    <main class="grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <!-- Sidebar: Paljindo 8 -->
        <div class="lg:col-span-1 space-y-6">
            <div class="glass-card border-l-4 border-l-neon-gold">
                <h3 class="orbitron text-neon-gold font-black mb-4 flex items-center justify-between">
                    <span>PALJINDO 8 CAPTAINS</span>
                    <i class="fas fa-shield-halved animate-pulse"></i>
                </h3>
                <div id="captains-list" class="space-y-3">
                    <!-- Paljindo 8 injected here -->
                </div>
            </div>
            <div class="glass-card">
                <h3 class="orbitron text-neon-blue font-black mb-4">ZHUGE TACTICAL INTEL</h3>
                <p id="zhuge-intel" class="text-sm leading-relaxed text-gray-300 font-medium"></p>
            </div>
        </div>

        <!-- Main Grid: Top Momentum -->
        <div class="lg:col-span-3">
            <div class="flex justify-between items-end mb-4 px-2">
                <h2 class="orbitron text-xl font-black text-white">IRON DOME: REAL-TIME RADAR GRID</h2>
                <span class="text-xs text-gray-500 font-mono" id="last-update-time">0.1 KRW PRECISION LOCK ACTIVE</span>
            </div>
            <div id="main-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                <!-- Main Grid cards injected here -->
            </div>
        </div>
    </main>

    <script>
        let previousData = null;

        async function fetchRadarData() {
            try {
                const response = await fetch('/krx_data.js?t=' + Date.now());
                const text = await response.text();
                eval(text);
                renderDashboard();
            } catch (e) { console.error("Sync Error:", e); }
        }

        function renderDashboard() {
            const data = window.krxTopVolume || [];
            const indices = window.krxIndices || {};
            const intel = window.krxZhugeIntel || "데이터 분석 중...";

            // 1. Render Indices & Macro (KOSPI, KOSDAQ, USDKRW)
            const indicesEl = document.getElementById('market-indices');
            indicesEl.innerHTML = Object.entries(indices).map(([name, info]) => {
                let displayName = name;
                if (name === 'USDKRW') displayName = '환율(원/달러)';
                if (name === 'WTIOIL') displayName = '국제유가(WTI)';
                
                const chgVal = parseFloat(info.chg);
                const color = isNaN(chgVal) ? 'text-yellow-500' : (chgVal >= 0 ? 'text-red-500' : 'text-blue-500'); 
                const priceStr = isNaN(parseFloat(info.price)) ? '<span class="text-yellow-500">ERROR</span>' : parseFloat(info.price).toLocaleString();
                const chgStr = isNaN(chgVal) ? 'ERROR' : (chgVal >= 0 ? '+' : '') + chgVal + '%';

                return `
                    <div class="glass-card flex items-center gap-3 py-2 px-4 shadow-inner whitespace-nowrap">
                        <span class="orbitron font-bold text-gray-400">${displayName}</span>
                        <span class="orbitron font-black text-white">${priceStr}</span>
                        <span class="text-xs font-bold ${color}">${chgStr}</span>
                    </div>
                `;
            }).join('');

            // 2. Render Intel
            document.getElementById('zhuge-intel').innerText = intel;

            // 3. Render Captains List (Sidebar) & Main Grid (Separated)
            const captains = data.filter(s => s.isCoreTarget);
            const others = data.filter(s => !s.isCoreTarget);

            document.getElementById('captains-list').innerHTML = captains.map(s => `
                <div class="flex justify-between items-center p-2 rounded bg-white/5 border border-white/10">
                    <span class="font-black text-white">${s.name}</span>
                    <div class="text-right">
                        <div class="text-neon-gold orbitron text-xs font-black">${isNaN(s.price) ? 'ERROR' : s.price.toLocaleString(undefined, {minimumFractionDigits: 1})} 원</div>
                        <div class="${isNaN(s.chg) ? 'text-yellow-500' : (s.chg >= 0 ? 'text-red-500' : 'text-blue-500')} text-[10px] font-bold">${isNaN(s.chg) ? 'ERROR' : (s.chg >= 0 ? '+' : '') + s.chg + '%'}</div>
                        <div class="${s.velocity > 0 ? 'text-red-400' : s.velocity < 0 ? 'text-blue-400' : 'text-gray-600'} text-[10px] font-mono">${s.velocity === 0 ? '' : '⚡' + (s.velocity > 0 ? '+' : '') + s.velocity.toFixed(3) + '%'}</div>
                    </div>
                </div>
            `).join('');

            document.getElementById('main-grid').innerHTML = data.map((s, idx) => {
                const color = s.chg >= 0 ? 'text-red-500' : 'text-blue-500';
                const bgClass = s.isCoreTarget ? 'captain-card' : '';
                return `
                    <div class="glass-card ${bgClass} flex flex-col justify-between">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <span class="text-[10px] text-gray-600 font-mono">#${idx+1}</span>
                                <h3 class="text-lg font-black text-white tracking-tighter">${s.name}</h3>
                                <div class="flex flex-wrap items-center gap-1 mt-0.5">
                                    <span class="text-[10px] bg-gray-800 text-gray-400 px-1 py-0.5 rounded">${s.theme || '추적중'}</span>
                                    ${s.rsi_60 <= 30 ? '<span class="text-[10px] bg-green-900/80 text-green-400 border-green-500 px-1.5 py-0.5 rounded border font-black animate-pulse shadow-[0_0_10px_rgba(34,197,94,0.6)]"><i class="fas fa-radar"></i> 바닥 도달(과매도) [RSI 30 빔 포착 - 매수 기회]</span>' : ''}
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="orbitron text-xl font-black text-white">${isNaN(s.price) ? '<span class="text-yellow-500">ERROR</span>' : s.price.toLocaleString(undefined, {minimumFractionDigits: 1})} <span class="text-[10px] opacity-40">원</span></div>
                                <div class="orbitron text-2xl font-black ${isNaN(s.chg) ? 'text-yellow-500' : (s.chg >= 0 ? 'text-red-500' : 'text-blue-500')} leading-none mt-1">${isNaN(s.chg) ? 'ERROR' : (s.chg >= 0 ? '+' : '') + s.chg + '%'}</div>
                            </div>
                        </div>
                        <div class="mt-4 pt-2 border-t border-white/5 flex justify-between items-center">
                            <span class="text-[11px] text-gray-500 font-bold">${s.vol.toLocaleString()} 억원</span>
                            <span class="text-[11px] text-neon-blue font-bold">${s.news || '실시간 감시'}</span>
                        </div>
                        <div class="mt-1 flex items-center gap-2">
                            <span class="text-[10px] text-gray-600">30s 모멘텀</span>
                            <span class="text-[11px] font-black orbitron ${s.velocity > 0 ? 'text-red-400' : s.velocity < 0 ? 'text-blue-400' : 'text-gray-600'}">${s.velocity === 0 ? '---' : (s.velocity > 0 ? '+' : '') + s.velocity.toFixed(3) + '%'}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // [v10.12] 2초 주기 갱신 + 마지막 업데이트 시간 표시
        setInterval(() => {
            fetchRadarData();
            const ts = new Date().toLocaleTimeString('ko-KR');
            const el = document.getElementById('last-update-time');
            if (el) el.innerText = '⟳ ' + ts + ' 갱신';
        }, 2000);
        fetchRadarData();
    </script>
</body>
</html>
